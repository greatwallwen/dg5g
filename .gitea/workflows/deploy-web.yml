name: Deploy DGBook Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/sync-gitee-ralph-loop-20260531
    paths:
      - ".gitea/workflows/deploy-web.yml"
      - "apps/web/**"
      - "packages/animation/**"
      - "packages/edugame-core/**"
      - "packages/widgets/**"
      - "packages/shared/**"
      - "site/public/media/**"
      - "scripts/check-web-structure.mjs"
      - "scripts/check-file-sizes.mjs"
      - "scripts/prepare-web-release.mjs"
      - "scripts/deploy-web-ssh.mjs"
      - "scripts/audit-web-remote.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    env:
      DGBOOK_DEPLOY_HOST: ${{ secrets.DGBOOK_DEPLOY_HOST }}
      DGBOOK_DEPLOY_USER: ${{ secrets.DGBOOK_DEPLOY_USER }}
      DGBOOK_DEPLOY_PASSWORD: ${{ secrets.DGBOOK_DEPLOY_PASSWORD }}
      DGBOOK_DEPLOY_SSH_KEY: ${{ secrets.DGBOOK_DEPLOY_SSH_KEY }}
      DGBOOK_DEPLOY_KNOWN_HOSTS: ${{ secrets.DGBOOK_DEPLOY_KNOWN_HOSTS }}
      DGBOOK_WEB_DEPLOY_HOST: ${{ secrets.DGBOOK_WEB_DEPLOY_HOST }}
      DGBOOK_WEB_DEPLOY_USER: ${{ secrets.DGBOOK_WEB_DEPLOY_USER }}
      DGBOOK_WEB_DEPLOY_PASSWORD: ${{ secrets.DGBOOK_WEB_DEPLOY_PASSWORD }}
      DGBOOK_WEB_DEPLOY_SSH_KEY: ${{ secrets.DGBOOK_WEB_DEPLOY_SSH_KEY }}
      DGBOOK_WEB_DEPLOY_KNOWN_HOSTS: ${{ secrets.DGBOOK_WEB_DEPLOY_KNOWN_HOSTS }}
      DGBOOK_WEB_DEPLOY_PUBLIC_HOST: ${{ secrets.DGBOOK_WEB_DEPLOY_PUBLIC_HOST }}
      DGBOOK_WEB_DEPLOY_BASE_DIR: ${{ secrets.DGBOOK_WEB_DEPLOY_BASE_DIR }}
      DGBOOK_WEB_DEPLOY_DROP_DIR: ${{ secrets.DGBOOK_WEB_DEPLOY_DROP_DIR }}
      DGBOOK_WEB_DEPLOY_SERVICE: ${{ secrets.DGBOOK_WEB_DEPLOY_SERVICE }}
      DGBOOK_WEB_DEPLOY_APP_PORT: ${{ secrets.DGBOOK_WEB_DEPLOY_APP_PORT }}
      DGBOOK_WEB_DEPLOY_NGINX: ${{ secrets.DGBOOK_WEB_DEPLOY_NGINX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install sshpass when password auth is used
        run: |
          if { [ -n "$DGBOOK_WEB_DEPLOY_PASSWORD" ] || [ -n "$DGBOOK_DEPLOY_PASSWORD" ]; } && command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: |
          node scripts/check-web-structure.mjs
          node scripts/check-file-sizes.mjs 800
          pnpm --filter @dgbook/edugame-core typecheck
          pnpm --filter @dgbook/widgets typecheck
          pnpm --filter @dgbook/animation typecheck
          pnpm --filter @dgbook/web typecheck

      - name: Build web release
        run: pnpm deploy:web:build-ready

      - name: Deploy web over SSH
        run: |
          if [ -z "$DGBOOK_WEB_DEPLOY_HOST" ] && [ -z "$DGBOOK_DEPLOY_HOST" ]; then
            echo "DGBOOK_WEB_DEPLOY_HOST is not configured; build-only CI pass."
            exit 0
          fi
          pnpm deploy:web:ssh

      - name: Remote web smoke
        run: |
          if [ -z "$DGBOOK_WEB_DEPLOY_HOST" ] && [ -z "$DGBOOK_DEPLOY_HOST" ]; then
            echo "DGBOOK_WEB_DEPLOY_HOST is not configured; remote smoke skipped."
            exit 0
          fi
          SMOKE_HOST="${DGBOOK_WEB_DEPLOY_PUBLIC_HOST:-${DGBOOK_WEB_DEPLOY_HOST:-$DGBOOK_DEPLOY_HOST}}"
          pnpm audit:web:remote -- \
            --base-url "http://${SMOKE_HOST}/" \
            --out output/playwright/web-runtime-remote

      - name: Upload release package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dgbook-web-release
          path: |
            artifacts/web-release/dgbook-web.tar.gz
            artifacts/web-release/dgbook-web.tar.gz.sha256
            artifacts/web-release/dgbook-web.upload-manifest.json
            output/playwright/web-runtime-remote/**
