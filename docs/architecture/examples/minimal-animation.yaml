schema: dgbook.asset.animation/v1
id: gpio-current-flow
stage:
  width: 1000
  height: 562
  aspectRatio: "16:9"
pages:
  - id: p1
    title: 电流路径
    startMs: 0
    durationMs: 8000
layers:
  - id: base
    role: background
  - id: main
    role: content
elements:
  - id: gpio
    type: shape
    layer: main
    page: p1
    box: { x: 110, y: 230, w: 120, h: 70 }
  - id: resistor
    type: shape
    layer: main
    page: p1
    box: { x: 360, y: 240, w: 150, h: 50 }
  - id: led
    type: shape
    layer: main
    page: p1
    box: { x: 650, y: 220, w: 100, h: 100 }
timeline:
  durationMs: 8000
  cues:
    - id: c1
      atMs: 400
      durationMs: 700
      effect: enter
      targets: [gpio, resistor, led]
      easing: easeOut
      payload: {}
    - id: c2
      atMs: 1800
      durationMs: 1200
      effect: flow
      targets: [gpio, resistor, led]
      easing: linear
      payload: { color: "#0f766e" }
